<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID COMMUNITY</title>

<style>
body{
    background:#050505;
    color:#00ff88;
    font-family:monospace;
    margin:0;
    padding:0;
}

header{
    padding:20px;
    border-bottom:1px solid #00ff88;
    text-align:center;
    letter-spacing:2px;
}

.container{
    width:90%;
    max-width:700px;
    margin:auto;
    margin-top:30px;
}

.card{
    border:1px solid #003322;
    background:#0b0b0b;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 0 10px #001a11;
}

input, textarea{
    width:100%;
    background:black;
    border:1px solid #00aa66;
    color:#00ff88;
    padding:10px;
    margin-top:10px;
    margin-bottom:10px;
    font-family:monospace;
}

button{
    background:#001a11;
    color:#00ff88;
    border:1px solid #00ff88;
    padding:10px 20px;
    cursor:pointer;
}

button:hover{
    background:#003322;
}

.post{
    border-left:3px solid #00ff88;
    padding-left:10px;
    margin-top:15px;
}

.small{
    color:#777;
    font-size:12px;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<header>
<h1>VOID COMMUNITY</h1>
<p class="small">Internal Cyber Discussion Board</p>
</header>

<div class="container">

<div class="card" id="registerBox">
<h2>Register</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="register()">Create Account</button>

<p class="small">
Hint: admin selalu menyimpan sesuatu di browser.
</p>
</div>

<div class="card hidden" id="forumBox">
<h2>Community Post</h2>

<textarea id="postInput" rows="5" placeholder="Write something..."></textarea>

<button onclick="publishPost()">Publish</button>

<div id="posts"></div>
</div>

</div>

<script>

// fake data
document.joko = `
Akun Instagram: @harvesman
Tanggal dan Tahun: 12 April 1990
Nama Lengkap: Jonathan
`;

function register(){

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    if(user.length < 3 || pass.length < 3){
        alert("Invalid account");
        return;
    }

    document.getElementById("registerBox").classList.add("hidden");
    document.getElementById("forumBox").classList.remove("hidden");

}

function publishPost(){

    let value = document.getElementById("postInput").value;

    let post = document.createElement("div");
    post.className = "post";

    // SENGAJA RENTAN XSS
    post.innerHTML = `
        <h3>anonymous_user</h3>
        <p>${value}</p>
    `;

    document.getElementById("posts").prepend(post);

}

</script>

</body>
</html>
